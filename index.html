<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Kasir PRO — XYZ Technologies</title>

</head>
<body>

<header>
  <h1>XYZ Technologies — Kasir PRO</h1>
</header>

<div class="tabs">
  <button id="tabBtnMenu" class="active">Menu Barang</button>
  <button id="tabBtnKasir">Kasir</button>
  <button id="tabBtnInvoice">Invoice</button>
</div>

<div class="container">
  <section id="tabMenu">
    <div class="form">
      <input id="namaBarang" type="text" placeholder="Nama barang (wajib)">
      <input id="hargaBarang" type="number" placeholder="Harga (wajib)">
      <div class="flex">
        <button class="btn primary" id="btnTambah">Tambah Barang</button>
        <button class="btn primary" id="btnExport">Export Data</button>
        <button class="btn warn" id="btnImport">Import Data</button>
        <input type="file" id="fileImport" accept=".json" style="display:none">
        <button class="btn ghost" id="btnBatalEdit" style="display:none">Batal Edit</button>
      </div>
    </div>
    <div id="listBarang" class="grid"></div>
  </section>

  <section id="tabKasir" class="hidden">
    <div class="search-box">
      <input type="text" id="searchKasir" placeholder="🔍 Cari nama barang..." oninput="filterKasir()">
    </div>
    <div class="grid" id="gridKasir"></div>
    <h3>Keranjang</h3>
    <table>
      <thead>
        <tr><th>Nama</th><th>Harga</th><th>Qty</th><th>Subtotal</th></tr>
      </thead>
      <tbody id="tbodyCart"></tbody>
      <tfoot>
        <tr><td colspan="3">TOTAL</td><td id="totalAkhir">Rp 0</td></tr>
      </tfoot>
    </table>
    <div class="form" style="margin-top:10px">
      <input id="namaKasir" type="text" placeholder="Nama Kasir (default Kasir 1)">
      <input id="uangPembeli" type="number" placeholder="Uang Pembeli">
      <div id="kembalian">Kembalian: Rp 0</div>
      <div class="flex">
        <button class="btn warn" id="btnBuatInvoice">BUAT INVOICE</button>
        <button class="btn danger" id="btnClearCart">Hapus Data Kasir</button>
      </div>
    </div>
  </section>

  <section id="tabInvoice" class="hidden">
    <div class="toolbar">
      <button class="btn primary" onclick="window.print()"><i class="fa fa-print"></i> Print</button>
      <button class="btn warn" onclick="exportToImage()"><i class="fa fa-image"></i> Export JPG</button>
      <button class="btn danger" id="btnHapusInvoice">Hapus Data Invoice</button>
    </div>

    <div id="resultsContainer">
      <div id="bingContainer" class="invoice-wrap">
        <div class="inv-header-flex">
          <div class="inv-logo-area">
            <img src="logo.png" alt="Logo Toko" id="invLogoImg">
            
          </div>
          
          <div class="inv-info-right">
            <b>INVOICE</b>
            <div id="invTanggal">-</div>
            <div id="invNomor" style="font-weight: bold; color: #2563eb !important;">INV: -</div>
            <div id="invKasir">Kasir: -</div>
          </div>
        </div>

        <table>
          <thead>
            <tr><th>Item</th><th>Qty</th><th>Harga</th><th>Sub</th></tr>
          </thead>
          <tbody id="invItems"></tbody>
        </table>

        <div class="inv-total-section">
          <div>Total: <span id="invTotal" class="inv-total">Rp 0</span></div>
          <div style="font-size: 12px;">Bayar: <span id="invUang">Rp 0</span></div>
          <div style="font-size: 12px;">Kembali: <span id="invKembali">Rp 0</span></div>
        </div>

        <div class="inv-footer">
          Terima kasih atas kunjungan Anda<br>
          Barang yang sudah dibeli tidak dapat ditukar kembali
          <div style="margin-top:10px">
            <a href="https://www.tiktok.com/@alfisyuhadak" target="_blank">
  <i class="fa-brands fa-tiktok"></i> @alfisyuhadak
</a>
• 
<a href="https://github.com/syuhadak27" target="_blank">
  <i class="fa-brands fa-github"></i> syuhadak27
</a>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
